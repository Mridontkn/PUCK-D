<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUCK'D — Hockey Lives Here</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Shared Components -->
    <div id="ticker"></div>

    <div id="navbar"></div>

    <!-- Page Content -->
    <section class="hero">
        <div class="wrap hero-grid">

            <div>

                <div class="hero-eyebrow-row">
                    <span class="offseason-dot"></span>

                    <span class="eyebrow" id="heroEyebrow">
                        Offseason — Free Agency Week 3
                    </span>

                </div>

                <h1 id="heroTitle">Loading headline…</h1>

                <p class="dek" id="heroDek"></p>

                <div class="byline" id="heroByline"></div>

            </div>

            <div class="hero-art">

                <a id="heroLink" href="#">
                    <img id="heroImage" src="" alt="">
                </a>

            </div>

        </div>
    </section>

    <section class="content">

        <div class="wrap content-grid">

            <div>

                <div class="tracker-head">
                    <div class="section-title">Latest Stories</div>
                    <span class="see-all">
                        Articles written by PUCK'D Writers.
                    </span>
                </div>

                <div class="article-list" id="articleList"></div>

            </div>

            <aside>

                <div class="sidebar-block">

                    <div class="tracker-head" style="margin-bottom:0;">
                        <div class="section-title" style="font-size:17px;">
                            Recent News
                        </div>
                    </div>

                    <div class="news-list" id="recentNewsList"></div>

                </div>

            </aside>

        </div>

    </section>

    <section class="newsletter">

        <div class="wrap newsletter-inner">

            <div>

                <h2>The NHL, explained daily.</h2>

                <p>
                    Get instant updates on the latest NHL news and analysis.
                </p>

            </div>

            <div class="form-row">
                <input type="email" placeholder="you@email.com">
                <button>Sign Up</button>
            </div>

        </div>

    </section>

    <!-- Shared Footer -->
    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="supabase.js"></script>

    <script src="script.js"></script>

    <script src="navbar.js"></script>

    <script src="articles.js"></script>

</body>

</html>
